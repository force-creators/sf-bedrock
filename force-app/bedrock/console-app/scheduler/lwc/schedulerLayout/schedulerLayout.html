<template>
    <section class="console-shell">
        <div class="hero">
            <div>
                <p class="eyebrow">Bedrock Scheduler</p>
                <h1>Upcoming Jobs</h1>
                <p class="hero-copy">
                    Live chronological view of scheduler runtime rows, last executions, and next planned runs.
                </p>
            </div>

            <div class="hero-actions">
                <lightning-badge label="Refreshes every 15 seconds"></lightning-badge>
                <lightning-button
                    label="Refresh Now"
                    icon-name="utility:refresh"
                    onclick={handleRefresh}
                    disabled={isLoading}
                ></lightning-button>
            </div>
        </div>

        <template lwc:if={hasMetadataChanges}>
            <div class="slds-notify slds-notify_alert warning-alert" role="alert">
                <span class="slds-assistive-text">Warning</span>
                <lightning-icon
                    icon-name="utility:warning"
                    size="x-small"
                    variant="warning"
                    class="alert-icon"
                ></lightning-icon>
                <span>
                    Scheduler metadata changed. Runtime rows will be recalculated at
                    <strong>{metadataRecalculationLabel}</strong>.
                </span>
            </div>
        </template>

        <template lwc:if={hasError}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Error</span>
                {errorMessage}
            </div>
        </template>

        <template lwc:if={hasJobErrors}>
            <div class="slds-notify slds-notify_alert job-error-alert" role="alert">
                <span class="slds-assistive-text">Error</span>
                <lightning-icon
                    icon-name="utility:error"
                    size="x-small"
                    variant="inverse"
                    class="alert-icon"
                ></lightning-icon>
                <span>
                    {errorSummaryLabel}. Review the highlighted job rows below for the stored error message.
                </span>
            </div>
        </template>

        <div class="metrics">
            <template for:each={metrics} for:item="metric">
                <article key={metric.id} class={metric.className}>
                    <span>{metric.label}</span>
                    <strong>{metric.value}</strong>
                </article>
            </template>
        </div>

        <section class="timeline-card">
            <lightning-tabset >
                <lightning-tab label="Schedule" value="schedule">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Schedule</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                            <template lwc:if={isLoading}>
                                <lightning-spinner alternative-text="Loading scheduler jobs" size="small"></lightning-spinner>
                            </template>
                        </div>

                        <template lwc:if={hasJobs}>
                            <div class="schedule-sections">
                                <template for:each={scheduleSections} for:item="section">
                                    <section key={section.key} class="schedule-section">
                                        <div class="schedule-section-heading">
                                            <div>
                                                <h3>{section.label}</h3>
                                                <p>{section.description}</p>
                                            </div>
                                            <span>{section.countLabel}</span>
                                        </div>

                                        <ol class="timeline">
                                            <template for:each={section.jobs} for:item="job">
                                                <li key={job.key} class={job.timelineClass}>
                                                    <div class="timeline-marker" aria-hidden="true"></div>
                                                    <article class="job-card">
                                                        <div class="job-main">
                                                            <div>
                                                                <h3>{job.apexClass}</h3>
                                                            </div>
                                                            <div class="badge-row">
                                                                <span class={job.statusClass}>{job.statusLabel}</span>
                                                                <template lwc:if={job.hasError}>
                                                                    <span class="error-badge">Last run error</span>
                                                                </template>
                                                            </div>
                                                        </div>

                                                        <dl class="job-times">
                                                            <div>
                                                                <dt>Last ran</dt>
                                                                <dd>{job.lastExecutedLabel}</dd>
                                                            </div>
                                                            <div>
                                                                <dt>Next run</dt>
                                                                <dd>{job.nextScheduledLabel}</dd>
                                                            </div>
                                                            <div>
                                                                <dt>Cadence</dt>
                                                                <dd>{job.cadence}</dd>
                                                            </div>
                                                        </dl>

                                                        <template lwc:if={job.hasError}>
                                                            <div class="last-error">
                                                                <span>Last error</span>
                                                                <p>{job.lastError}</p>
                                                            </div>
                                                        </template>
                                                    </article>
                                                </li>
                                            </template>
                                        </ol>
                                    </section>
                                </template>
                            </div>
                        </template>

                        <template lwc:else>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:clock" size="medium"></lightning-icon>
                                <h3>No scheduler runtime rows yet</h3>
                                <p>Run the Scheduler heartbeat once to translate metadata into runtime records.</p>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <lightning-tab label="Jobs" value="jobs">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Jobs</h2>
                                <p>{jobConfigurationCountLabel}</p>
                            </div>
                            <template lwc:if={isLoading}>
                                <lightning-spinner alternative-text="Loading scheduler job configurations" size="small"></lightning-spinner>
                            </template>
                        </div>

                        <template lwc:if={hasJobConfigurations}>
                            <lightning-datatable
                                key-field="id"
                                columns={jobConfigurationColumns}
                                data={jobConfigurations}
                                hide-checkbox-column
                                is-loading={isLoading}
                                onrowaction={handleJobConfigurationAction}
                            ></lightning-datatable>
                        </template>

                        <template lwc:else>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:settings" size="medium"></lightning-icon>
                                <h3>No scheduler job configurations yet</h3>
                                <p>Create Scheduler Job custom metadata records to define logical jobs.</p>
                            </div>
                        </template>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </section>
    </section>
</template>
