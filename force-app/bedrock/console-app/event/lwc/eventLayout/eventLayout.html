<template>
    <c-bedrock-console-layout
        eyebrow="Bedrock EventRelay"
        heading="Event Console"
        description="Operator view of publish work queued by EventRelay, active lanes, parked threads, and publish failures."
        error-message={errorMessage}
        metrics={metricCards}
    >
        <lightning-button
            slot="actions"
            label={refreshButtonLabel}
            icon-name="utility:refresh"
            onclick={handleRefresh}
            disabled={isRefreshing}
        ></lightning-button>

        <c-bedrock-console-panel>
            <lightning-tabset>
                <lightning-tab label="Events" value="events">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Events</h2>
                                <p>{eventRouteCountLabel}. {lastRefreshedLabel}</p>
                            </div>
                            <template lwc:if={isRefreshing}>
                                <lightning-spinner alternative-text="Loading event routes" size="small"></lightning-spinner>
                            </template>
                        </div>

                        <template lwc:if={hasConfigRows}>
                            <div class="route-grid">
                                <template for:each={routeCards} for:item="route">
                                    <c-bedrock-route-card
                                        key={route.id}
                                        label={route.payloadType}
                                        card-title={route.route}
                                        icon-name="utility:event"
                                        badges={route.badges}
                                    >
                                        <div slot="details">
                                        <dl class="route-details">
                                            <div>
                                                <dt>Payload Type</dt>
                                                <dd>{route.payloadType}</dd>
                                            </div>
                                            <div>
                                                <dt>Route</dt>
                                                <dd>{route.route}</dd>
                                            </div>
                                            <div>
                                                <dt>Work Items</dt>
                                                <dd>{route.workItems}</dd>
                                            </div>
                                        </dl>
                                        </div>
                                    </c-bedrock-route-card>
                                </template>
                            </div>
                        </template>

                        <template lwc:else>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:event" size="medium"></lightning-icon>
                                <h3>No event routes found</h3>
                                <p>Publish work creates route summaries as EventRelay records are queued.</p>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <lightning-tab label="Backlog" value="backlog">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Backlog</h2>
                                <p>Pending publish work waiting for a lane. {lastRefreshedLabel}</p>
                            </div>
                            <lightning-badge label={backlogCountLabel}></lightning-badge>
                        </div>

                        <template lwc:if={hasBacklogRows}>
                            <lightning-datatable
                                key-field="id"
                                columns={workColumns}
                                data={backlogRows}
                                hide-checkbox-column
                                sorted-by={backlogSortBy}
                                sorted-direction={backlogSortDirection}
                                is-loading={isRefreshing}
                                onsort={handleBacklogSort}
                            ></lightning-datatable>
                        </template>

                        <template lwc:else>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:success" size="medium"></lightning-icon>
                                <h3>No pending publish work found</h3>
                                <p>EventRelay publish backlog appears here while work waits for a lane.</p>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <lightning-tab label="Errors" value="errors">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Errors</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                            <lightning-badge label={errorCountLabel}></lightning-badge>
                        </div>

                        <template lwc:if={hasErrorRows}>
                            <template lwc:if={hasSelectedErrorRows}>
                                <div class="table-actions">
                                    <lightning-button
                                        label="Retry"
                                        icon-name="utility:redo"
                                        onclick={handleRetrySelected}
                                        disabled={isSelectedErrorActionDisabled}
                                    ></lightning-button>
                                    <lightning-button
                                        label="Delete"
                                        icon-name="utility:delete"
                                        variant="destructive"
                                        onclick={handleDeleteSelected}
                                        disabled={isSelectedErrorActionDisabled}
                                    ></lightning-button>
                                    <span class="selected-count">{selectedErrorCountLabel} selected</span>
                                </div>
                            </template>

                            <lightning-datatable
                                key-field="id"
                                columns={errorColumns}
                                data={errorRows}
                                selected-rows={selectedErrorRowIds}
                                sorted-by={errorSortBy}
                                sorted-direction={errorSortDirection}
                                is-loading={isRefreshing}
                                onrowselection={handleErrorSelection}
                                onsort={handleErrorSort}
                            ></lightning-datatable>
                        </template>

                        <template lwc:else>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:success" size="medium"></lightning-icon>
                                <h3>No failed publish work found</h3>
                                <p>EventRelay publish errors appear here when retryable work fails.</p>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <lightning-tab label="Archive" value="archive">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Archive</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                            <lightning-badge label={archiveCountLabel}></lightning-badge>
                        </div>

                        <template lwc:if={hasArchiveRows}>
                            <lightning-datatable
                                key-field="id"
                                columns={workColumns}
                                data={archiveRows}
                                hide-checkbox-column
                                sorted-by={archiveSortBy}
                                sorted-direction={archiveSortDirection}
                                is-loading={isRefreshing}
                                onsort={handleArchiveSort}
                            ></lightning-datatable>
                        </template>

                        <template lwc:else>
                            <div class="empty-state">
                                <lightning-icon icon-name="utility:event" size="medium"></lightning-icon>
                                <h3>No archived publish work found</h3>
                                <p>Stale or duplicate EventRelay publish work is retained here for audit.</p>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <lightning-tab label="Settings" value="settings">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Settings</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <div class="settings-rows">
                            <article class="setting-row global-row">
                                <div class="row-owner">
                                    <p>Global</p>
                                    <h3>EventRelay Defaults</h3>
                                    <span>Effective publish settings</span>
                                </div>
                                <div class="setting-values">
                                    <div class="setting-cell">
                                        <span>Publish Batch Size</span>
                                        <strong>{publishBatchSize}</strong>
                                    </div>
                                    <div class="setting-cell">
                                        <span>Limit Safety Threshold</span>
                                        <strong>{limitThresholdPct}</strong>
                                    </div>
                                    <div class="setting-cell">
                                        <span>Publish Pool</span>
                                        <strong>{publishPool}</strong>
                                    </div>
                                </div>
                            </article>
                        </div>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </c-bedrock-console-panel>
    </c-bedrock-console-layout>
</template>
