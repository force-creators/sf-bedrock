<template>
    <c-bedrock-console-layout
        eyebrow="Bedrock Thread"
        heading="Thread Monitor"
        description="Operator view of shared Bedrock infrastructure threads, active work lanes, stale heartbeat candidates, and completed lifecycle history."
        error-message={metricsErrorMessage}
        metrics={metricCards}
    >
        <lightning-button
            slot="actions"
            label={refreshButtonLabel}
            icon-name="utility:refresh"
            onclick={handleRefresh}
            disabled={isRefreshing}
        ></lightning-button>

        <c-bedrock-console-panel>
            <lightning-tabset>
                <lightning-tab
                    label="Running"
                    value="running"
                    onactive={handleTabActive}
                >
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Running</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-thread-running
                            oncountchange={handlePageCountChange}
                        ></c-thread-running>
                    </div>
                </lightning-tab>

                <lightning-tab
                    label="Completed"
                    value="completed"
                    onactive={handleTabActive}
                >
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Completed</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-thread-completed
                            oncountchange={handlePageCountChange}
                        ></c-thread-completed>
                    </div>
                </lightning-tab>

                <lightning-tab label="Settings" value="settings">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Settings</h2>
                                <p>Thread capacity and recovery settings</p>
                            </div>
                        </div>

                        <c-thread-settings></c-thread-settings>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </c-bedrock-console-panel>
    </c-bedrock-console-layout>
</template>
