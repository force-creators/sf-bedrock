<template>
    <section class="console-shell">
        <div class="hero">
            <div>
                <p class="eyebrow">Bedrock Thread</p>
                <h1>Thread Monitor</h1>
                <p class="hero-copy">
                    Operator view of shared Bedrock infrastructure threads, active work lanes, stale heartbeat candidates, and completed lifecycle history.
                </p>
            </div>

            <div class="hero-actions">
                <lightning-combobox
                    class="refresh-interval"
                    label="Auto-refresh interval"
                    variant="label-hidden"
                    value={autoRefreshInterval}
                    options={autoRefreshOptions}
                    onchange={handleAutoRefreshChange}
                ></lightning-combobox>
                <lightning-button
                    label={refreshButtonLabel}
                    icon-name="utility:refresh"
                    onclick={handleRefresh}
                    disabled={isRefreshing}
                ></lightning-button>
            </div>
        </div>

        <template lwc:if={hasMetricsError}>
            <div class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium" role="alert">
                <span class="slds-assistive-text">Error</span>
                {metricsErrorMessage}
            </div>
        </template>

        <div class="metrics">
            <template for:each={metricCards} for:item="metric">
                <article key={metric.id} class={metric.className}>
                    <span>{metric.label}</span>
                    <strong>{metric.value}</strong>
                </article>
            </template>
        </div>

        <section class="timeline-card">
            <lightning-tabset>
                <lightning-tab label="Running" value="running" onactive={handleTabActive}>
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Running</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-thread-running oncountchange={handlePageCountChange}></c-thread-running>
                    </div>
                </lightning-tab>

                <lightning-tab label="Completed" value="completed" onactive={handleTabActive}>
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Completed</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-thread-completed oncountchange={handlePageCountChange}></c-thread-completed>
                    </div>
                </lightning-tab>

                <lightning-tab label="Settings" value="settings">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Settings</h2>
                                <p>Thread capacity and recovery settings</p>
                            </div>
                        </div>

                        <c-thread-settings></c-thread-settings>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </section>
    </section>
</template>
