<template>
    <template lwc:if={isArchiveRunning}>
        <div
            class="slds-notify slds-notify_alert slds-alert_info slds-m-bottom_medium"
            role="status"
        >
            <span class="slds-assistive-text">Info</span>
            Async archive job is running.
        </div>
    </template>

    <template lwc:if={hasError}>
        <div
            class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium"
            role="alert"
        >
            <span class="slds-assistive-text">Error</span>
            {errorMessage}
        </div>
    </template>

    <c-bedrock-console-table
        columns={columns}
        rows={rows}
        count-label={recordCountLabel}
        search-term={searchTerm}
        search-placeholder="Filter by archive, class, record, or thread"
        show-search
        hide-checkbox-column
        is-loading={isLoading}
        sorted-by={sortBy}
        sorted-direction={sortDirection}
        empty-icon-name="utility:archive"
        empty-heading="No archived async jobs found"
        empty-message="Archived async work appears here after cleanup runs."
        onsearchchange={handleTableSearchChange}
        onrefresh={handleRefresh}
        onsort={handleSort}
    >
        <span slot="actions" class="slds-text-body_small slds-text-color_weak"
            >{lastRefreshedLabel}</span
        >
        <lightning-button
            slot="actions"
            icon-name="utility:play"
            label="Run Now"
            onclick={handleRunNow}
            disabled={isRunDisabled}
        ></lightning-button>
    </c-bedrock-console-table>
</template>
