<template>
    <lightning-card title="Errors" icon-name="utility:error">
        <div slot="actions" class="card-actions">
            <lightning-button-icon
                class={refreshButtonClass}
                icon-name="utility:refresh"
                alternative-text="Refresh errors"
                title="Refresh errors"
                onclick={handleRefresh}
                disabled={isLoading}
            ></lightning-button-icon>

            <lightning-badge label={recordCountLabel}></lightning-badge>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template lwc:if={hasError}>
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    {errorMessage}
                </div>
            </template>

            <template lwc:elseif={hasRows}>
                <template lwc:if={hasSelectedRows}>
                    <div class="table-actions" aria-label="Selected work item actions">
                        <lightning-button
                            icon-name="utility:refresh"
                            label="Retry"
                            title="Retry selected errors"
                            onclick={handleRetrySelected}
                            disabled={isLoading}
                        ></lightning-button>

                        <lightning-button
                            icon-name="utility:delete"
                            label="Delete"
                            title="Delete selected errors"
                            variant="destructive"
                            onclick={handleDeleteSelected}
                            disabled={isLoading}
                        ></lightning-button>
                        <span class="slds-text-body_small slds-text-color_weak">
                            {selectedCountLabel}
                        </span>
                    </div>
                </template>

                <lightning-tree-grid
                    key-field="id"
                    columns={columns}
                    data={treeRows}
                    expanded-rows={expandedRows}
                    selected-rows={selectedRowIds}
                    is-loading={isLoading}
                    onrowselection={handleRowSelection}
                ></lightning-tree-grid>
            </template>

            <template lwc:else>
                <div class="empty-state slds-text-align_center" role="status">
                    <lightning-icon
                        icon-name="utility:success"
                        size="medium"
                        alternative-text=""
                    ></lightning-icon>
                    <p class="slds-m-top_small">No error records found.</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
