<template>
    <section class="backlog" aria-label="Errors">
        <header class="backlog-header">
            <div>
                <p class="eyebrow">Async__c</p>
                <h2>Errors</h2>
                <p class="description">Async work that ended with an error.</p>
            </div>

            <div class="header-actions">
                <p class="last-refreshed">{lastRefreshedLabel}</p>

                <div class="refresh-controls">
                    <lightning-combobox
                        class="refresh-interval"
                        label="Auto-refresh interval"
                        variant="label-hidden"
                        value={autoRefreshInterval}
                        options={autoRefreshOptions}
                        onchange={handleAutoRefreshChange}
                    ></lightning-combobox>

                    <lightning-button
                        icon-name="utility:refresh"
                        label="Refresh"
                        title="Refresh errors"
                        onclick={handleRefresh}
                        disabled={isLoading}
                    ></lightning-button>
                </div>

                <div class="record-count">{recordCountLabel}</div>
            </div>
        </header>

        <template lwc:if={hasError}>
            <div class="error-message" role="status">{errorMessage}</div>
        </template>

        <template lwc:elseif={hasRows}>
            <template lwc:if={hasSelectedRows}>
                <div class="table-actions" aria-label="Selected work item actions">
                    <lightning-button
                        icon-name="utility:refresh"
                        label="Retry"
                        title="Retry selected errors"
                        onclick={handleRetrySelected}
                        disabled={isLoading}
                    ></lightning-button>

                    <lightning-button
                        icon-name="utility:delete"
                        label="Delete"
                        title="Delete selected errors"
                        onclick={handleDeleteSelected}
                        disabled={isLoading}
                    ></lightning-button>
                    <span class="selected-count">{selectedCountLabel}</span>
                </div>
            </template>

            <lightning-tree-grid
                key-field="id"
                columns={columns}
                data={treeRows}
                expanded-rows={expandedRows}
                selected-rows={selectedRowIds}
                is-loading={isLoading}
                onrowselection={handleRowSelection}
            ></lightning-tree-grid>
        </template>

        <template lwc:else>
            <div class="empty-state" role="status">
                <lightning-icon
                    icon-name="utility:success"
                    size="medium"
                    alternative-text=""
                ></lightning-icon>
                <p>No error records found.</p>
            </div>
        </template>
    </section>
</template>
