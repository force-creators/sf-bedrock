<template>
    <lightning-card title="Dashboard" icon-name="utility:home">
        <lightning-badge slot="actions" label="Live data"></lightning-badge>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <div class="metric-grid">
                <template for:each={metrics} for:item="item">
                    <div key={item.id} class="metric-tile">
                        <span class="slds-text-title_caps">{item.label}</span>
                        <template lwc:if={isLoading}>
                            <lightning-spinner
                                alternative-text="Loading"
                                size="small"
                            ></lightning-spinner>
                        </template>
                        <template lwc:else>
                            <strong>{item.value}</strong>
                        </template>
                    </div>
                </template>
            </div>

            <template lwc:if={hasError}>
                <div
                    class="slds-notify slds-notify_alert slds-alert_error slds-m-top_medium"
                    role="alert"
                >
                    <span class="slds-assistive-text">Error</span>
                    {errorMessage}
                </div>
            </template>
        </div>
    </lightning-card>
</template>
