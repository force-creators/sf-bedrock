<template>
    <header class="content-header">
        <div>
            <p class="eyebrow">Overview</p>
            <h2>Dashboard</h2>
            <p class="description">A consolidated view of async throughput, backlog, and errors.</p>
        </div>
        <div class="status-pill">Live data</div>
    </header>

    <section class="dashboard-panel" aria-label="Dashboard">
        <div class="dashboard-summary">
            <p class="eyebrow">Async Work</p>
            <h3>Job Health</h3>
            <p>Today's completed work, active backlog, and current error volume.</p>
        </div>

        <div class="metric-grid">
            <template for:each={metrics} for:item="item">
                <div key={item.id} class="metric-card">
                    <span>{item.label}</span>
                    <template lwc:if={isLoading}>
                        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
                    </template>
                    <template lwc:else>
                        <strong>{item.value}</strong>
                    </template>
                </div>
            </template>
        </div>

        <template lwc:if={hasError}>
            <div class="error-message" role="alert">{errorMessage}</div>
        </template>
    </section>
</template>
