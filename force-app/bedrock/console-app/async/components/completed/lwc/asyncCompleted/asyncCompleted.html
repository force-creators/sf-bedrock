<template>
    <template lwc:if={hasError}>
        <div
            class="slds-notify slds-notify_alert slds-alert_error slds-m-bottom_medium"
            role="alert"
        >
            <span class="slds-assistive-text">Error</span>
            {errorMessage}
        </div>
    </template>

    <c-bedrock-console-table
        columns={columns}
        rows={rows}
        count-label={recordCountLabel}
        search-term={searchTerm}
        search-placeholder="Filter by job, class, record, or thread"
        show-search
        hide-checkbox-column
        is-loading={isLoading}
        sorted-by={sortBy}
        sorted-direction={sortDirection}
        empty-icon-name="utility:success"
        empty-heading="No completed async jobs found"
        empty-message="Completed async work appears here after jobs finish."
        onsearchchange={handleTableSearchChange}
        onrefresh={handleRefresh}
        onsort={handleSort}
    ></c-bedrock-console-table>
</template>
