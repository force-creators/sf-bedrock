<template>
    <lightning-card title="Backlog" icon-name="utility:list">
        <div slot="actions" class="card-actions">
            <lightning-button-icon
                class={refreshButtonClass}
                icon-name="utility:refresh"
                alternative-text="Refresh backlog"
                title="Refresh backlog"
                onclick={handleRefresh}
                disabled={isLoading}
            ></lightning-button-icon>

            <lightning-badge label={recordCountLabel}></lightning-badge>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">
            <template lwc:if={hasError}>
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span class="slds-assistive-text">Error</span>
                    {errorMessage}
                </div>
            </template>

            <template lwc:elseif={hasRows}>
                <lightning-tree-grid
                    key-field="id"
                    columns={columns}
                    data={treeRows}
                    expanded-rows={expandedRows}
                    hide-checkbox-column
                    is-loading={isLoading}
                ></lightning-tree-grid>
            </template>

            <template lwc:else>
                <div class="empty-state slds-text-align_center" role="status">
                    <lightning-icon
                        icon-name="utility:success"
                        size="medium"
                        alternative-text=""
                    ></lightning-icon>
                    <p class="slds-m-top_small">No backlog records found.</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
