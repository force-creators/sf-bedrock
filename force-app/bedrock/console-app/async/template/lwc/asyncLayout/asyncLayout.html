<template>
    <div class="slds-grid slds-wrap layout-shell">
        <aside class="slds-col slds-size_1-of-1 slds-medium-size_3-of-12 slds-large-size_2-of-12 nav-column">
            <section class="slds-card nav-card">
                <div class="slds-card__body slds-card__body_inner">
                    <nav class="slds-nav-vertical" aria-label="Async Console Navigation">
                        <div class="slds-nav-vertical__section">
                            <h2 class="slds-nav-vertical__title">Async Console</h2>
                            <ul>
                                <template for:each={navItems} for:item="item">
                                    <li key={item.id} class={item.itemClass}>
                                        <button
                                            class="slds-button slds-button_reset slds-nav-vertical__action nav-action"
                                            data-id={item.id}
                                            onclick={handleNavSelect}
                                        >
                                            <lightning-icon
                                                icon-name={item.iconName}
                                                size="x-small"
                                                class="nav-icon"
                                            ></lightning-icon>
                                            <span class="nav-label">{item.label}</span>
                                            <template lwc:if={item.showCount}>
                                                <span class="slds-badge count-badge">{item.count}</span>
                                            </template>
                                        </button>
                                    </li>
                                </template>
                            </ul>
                        </div>
                    </nav>
                </div>
            </section>
        </aside>

        <main class="slds-col slds-size_1-of-1 slds-medium-size_9-of-12 slds-large-size_10-of-12 content-column">
            <section class="slds-card content-card">
                <div class="slds-card__body slds-card__body_inner page-panel">
                    <template lwc:if={isDashboard}>
                        <c-async-dashboard></c-async-dashboard>
                    </template>
                    <template lwc:elseif={isBacklog}>
                        <c-async-backlog oncountchange={handleBacklogCountChange}></c-async-backlog>
                    </template>
                    <template lwc:elseif={isErrors}>
                        <c-async-errors oncountchange={handleErrorsCountChange}></c-async-errors>
                    </template>
                    <template lwc:elseif={isJobConfigurations}>
                        <c-async-job-configurations></c-async-job-configurations>
                    </template>
                </div>
            </section>
        </main>
    </div>
</template>
