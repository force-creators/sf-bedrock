<template>
    <c-bedrock-console-layout
        eyebrow="Bedrock Async"
        heading="Async Jobs"
        description="Live view of queued work, terminal errors, completed jobs, and configured async job types."
        error-message={metricsErrorMessage}
        metrics={metricCards}
    >
        <lightning-button
            slot="actions"
            label={refreshButtonLabel}
            icon-name="utility:refresh"
            onclick={handleRefresh}
            disabled={isRefreshing}
        ></lightning-button>

        <c-bedrock-console-panel>
            <lightning-tabset>
                <lightning-tab
                    label="Backlog"
                    value="backlog"
                    onactive={handleTabActive}
                >
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Backlog</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-async-backlog
                            oncountchange={handlePageCountChange}
                        ></c-async-backlog>
                    </div>
                </lightning-tab>

                <lightning-tab
                    label="Errors"
                    value="errors"
                    onactive={handleTabActive}
                >
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Errors</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-async-errors
                            oncountchange={handlePageCountChange}
                        ></c-async-errors>
                    </div>
                </lightning-tab>

                <lightning-tab
                    label="Completed"
                    value="completed"
                    onactive={handleTabActive}
                >
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Completed</h2>
                                <p>{lastRefreshedLabel}</p>
                            </div>
                        </div>

                        <c-async-completed
                            oncountchange={handlePageCountChange}
                        ></c-async-completed>
                    </div>
                </lightning-tab>

                <lightning-tab
                    label="Archive"
                    value="archive"
                    onactive={handleTabActive}
                >
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Archive</h2>
                                <p>Archived async jobs</p>
                            </div>
                        </div>

                        <c-async-archive
                            oncountchange={handlePageCountChange}
                        ></c-async-archive>
                    </div>
                </lightning-tab>

                <lightning-tab label="Jobs" value="jobs">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Jobs</h2>
                                <p>Async job metadata</p>
                            </div>
                        </div>

                        <c-async-job-configurations></c-async-job-configurations>
                    </div>
                </lightning-tab>

                <lightning-tab label="Settings" value="settings">
                    <div class="tab-panel">
                        <div class="section-heading">
                            <div>
                                <h2>Settings</h2>
                                <p>Async thread settings</p>
                            </div>
                        </div>

                        <c-async-settings></c-async-settings>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </c-bedrock-console-panel>
    </c-bedrock-console-layout>
</template>
