<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1280 820">
  <title id="title">Async threading subway map</title>
  <desc id="desc">A subway-style map of Async work moving from enqueue through ThreadRunner, job execution, finalizer continuation, and backlog handoff.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #f7f9fb; stroke: #d8dde6; stroke-width: 2; }
      .title { fill: #032d60; font: 700 34px Inter, Arial, sans-serif; }
      .subtitle { fill: #444b5a; font: 18px Inter, Arial, sans-serif; }
      .label { fill: #181818; font: 700 16px Inter, Arial, sans-serif; }
      .small { fill: #444b5a; font: 13px Inter, Arial, sans-serif; }
      .tiny { fill: #444b5a; font: 12px Inter, Arial, sans-serif; }
      .line { fill: none; stroke-width: 16; stroke-linecap: round; stroke-linejoin: round; }
      .thin { fill: none; stroke-width: 6; stroke-linecap: round; stroke-linejoin: round; }
      .async { stroke: #0176d3; }
      .thread { stroke: #525a6a; }
      .handoff { stroke: #7060c8; stroke-dasharray: 10 12; }
      .station { fill: #ffffff; stroke: #181818; stroke-width: 5; }
      .soft { fill: #ffffff; stroke: #d8dde6; stroke-width: 2; }
      .chip { fill: #eaf5fe; stroke: #9ac8ef; stroke-width: 2; }
      .chipText { fill: #032d60; font: 700 13px Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="820"/>
  <text class="title" x="56" y="58">Async Line</text>
  <text class="subtitle" x="56" y="88">Async threads are transaction-born backlogs: one enqueueing transaction creates one linear lane of record Id work.</text>
  <rect class="panel" x="44" y="118" width="1192" height="610" rx="8"/>

  <path class="line async" d="M 94 282 H 262 C 326 282 326 214 394 214 H 560 C 646 214 646 352 734 352 H 1166"/>
  <path class="line thread" d="M 394 430 H 1028"/>
  <path class="thin handoff" d="M 1030 352 C 1096 398 1096 430 1030 476 C 960 526 790 526 724 476"/>

  <circle class="station" cx="118" cy="282" r="14"/>
  <text class="label" x="76" y="238">Service or trigger</text>
  <text class="small" x="76" y="260">decides record work</text>

  <circle class="station" cx="262" cy="282" r="14"/>
  <text class="label" x="208" y="326">Async.enqueue</text>
  <text class="small" x="208" y="348">or stage + flush</text>

  <circle class="station" cx="394" cy="214" r="14"/>
  <text class="label" x="326" y="168">Async__c rows</text>
  <text class="small" x="326" y="190">one row per Id</text>

  <circle class="station" cx="560" cy="214" r="14"/>
  <text class="label" x="486" y="168">Thread.currentOrCreate</text>
  <text class="small" x="486" y="190">Pool = Async</text>

  <circle class="station" cx="734" cy="352" r="14"/>
  <text class="label" x="658" y="306">ThreadRunner</text>
  <text class="small" x="658" y="328">starts when a slot opens</text>

  <circle class="station" cx="910" cy="352" r="14"/>
  <text class="label" x="824" y="306">Async dispatcher</text>
  <text class="small" x="824" y="328">selects next batch</text>

  <circle class="station" cx="1086" cy="352" r="14"/>
  <text class="label" x="1024" y="306">execute(Set&lt;Id&gt;)</text>
  <text class="small" x="1024" y="328">subscriber code</text>

  <circle class="station" cx="394" cy="430" r="14"/>
  <text class="label" x="314" y="472">Thread__c lane</text>
  <text class="small" x="314" y="494">Status = Pending</text>

  <circle class="station" cx="560" cy="430" r="14"/>
  <text class="label" x="486" y="472">Capacity check</text>
  <text class="small" x="486" y="494">Max_Threads__c</text>

  <circle class="station" cx="724" cy="430" r="14"/>
  <text class="label" x="650" y="472">Run_Key__c</text>
  <text class="small" x="650" y="494">authorized chain</text>

  <circle class="station" cx="878" cy="430" r="14"/>
  <text class="label" x="812" y="472">JobWatcher</text>
  <text class="small" x="812" y="494">finalizer</text>

  <circle class="station" cx="1028" cy="430" r="14"/>
  <text class="label" x="952" y="472">continueCurrent</text>
  <text class="small" x="952" y="494">next batch or Done</text>

  <rect class="soft" x="86" y="548" width="312" height="128" rx="8"/>
  <text class="label" x="112" y="592">Debug here first</text>
  <text class="small" x="112" y="620">Async__c.Status__c</text>
  <text class="small" x="112" y="644">Async__c.Thread__c</text>
  <text class="small" x="112" y="668">Apex, record, and error fields</text>

  <rect class="soft" x="462" y="548" width="334" height="128" rx="8"/>
  <text class="label" x="488" y="592">Then inspect the lane</text>
  <text class="small" x="488" y="620">Thread__c.Status__c</text>
  <text class="small" x="488" y="644">Pool__c = Async</text>
  <text class="small" x="488" y="668">Thread key, heartbeat, run key</text>

  <rect class="soft" x="860" y="548" width="320" height="128" rx="8"/>
  <text class="label" x="886" y="592">Remember the rule</text>
  <text class="small" x="886" y="620">One transaction becomes one backlog.</text>
  <text class="small" x="886" y="644">Parallelism happens between backlogs,</text>
  <text class="small" x="886" y="668">not inside one large enqueue.</text>

  <rect class="chip" x="86" y="742" width="1096" height="42" rx="6"/>
  <text class="chipText" x="108" y="768">Async mental model: Id intent goes into Async__c, Thread controls when the lane runs, JobWatcher keeps the lane moving until it drains.</text>
</svg>
